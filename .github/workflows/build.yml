name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Create new Flutter project and migrate code
        run: |
          # 创建临时文件夹
          mkdir temp_project
          cd temp_project
          # 生成全新的 Flutter 项目
          flutter create -t app .
          # 删除新项目中的默认 lib 和 pubspec.yaml
          rm -rf lib pubspec.yaml
          # 复制你的代码（来自原仓库的 image_matcher_app 子文件夹）
          cp -r ../image_matcher_app/lib .
          cp ../image_matcher_app/pubspec.yaml .
          # 回到上级目录
          cd ..
          # 将 temp_project 整个移动到原仓库根目录（覆盖原 image_matcher_app）
          rm -rf image_matcher_app
          mv temp_project image_matcher_app
          cd image_matcher_app
          flutter pub get

      - name: Build APK
        run: |
          cd image_matcher_app
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: image_matcher_app/build/app/outputs/flutter-apk/app-release.apk
