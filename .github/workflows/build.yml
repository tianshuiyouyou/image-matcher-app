name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Prepare build environment
        run: |
          # 创建临时项目
          cd /tmp
          flutter create -t app temp_project
          # 进入你的代码仓库
          cd $GITHUB_WORKSPACE/image_matcher_app
          # 复制临时项目的 android 文件夹
          cp -r /tmp/temp_project/android .
          # 复制临时项目的 gradle 相关文件
          cp /tmp/temp_project/gradle.properties .
          cp /tmp/temp_project/settings.gradle .
          cp /tmp/temp_project/gradle/wrapper/gradle-wrapper.jar gradle/wrapper/
          cp /tmp/temp_project/gradle/wrapper/gradle-wrapper.properties gradle/wrapper/
          # 清理可能冲突的缓存
          rm -rf .gradle
          # 获取依赖
          flutter pub get

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE/image_matcher_app
          flutter build apk --release --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: image_matcher_app/build/app/outputs/flutter-apk/app-release.apk
