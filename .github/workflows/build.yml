name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Setup Android project
        run: |
          cd image_matcher_app
          # 自动输入 n 以避免覆盖已有的 lib 和 pubspec.yaml
          echo n | flutter create --platforms=android .
          flutter pub get

      - name: Build APK
        run: |
          cd image_matcher_app
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: image_matcher_app/build/app/outputs/flutter-apk/app-release.apk
